name: validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  actions: read

jobs:
  repo-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run repository contract validation
        run: python scripts/validate_repo_contracts.py --mode validate

  importer-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate Python importer fixtures
        run: python scripts/python_importer_conformance.py --mode validate-fixtures
      - name: Validate Rust importer fixtures
        run: python scripts/rust_importer_conformance.py --mode validate-fixtures

  bootstrap-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run bootstrap pipeline validation
        run: python scripts/scir_bootstrap_pipeline.py --mode validate

  sweep-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - id: baseline
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner,
              repo,
              workflow_id: 'validate.yml',
              branch: 'main',
              status: 'completed',
              per_page: 50,
            });
            const baseline = runs.find(run => run.conclusion === 'success' && String(run.id) !== String(context.runId));
            core.setOutput('run_id', baseline ? String(baseline.id) : '');
      - if: steps.baseline.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: sweep-smoke
          path: artifacts/baseline-sweep-smoke
          repository: ${{ github.repository }}
          run-id: ${{ steps.baseline.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run proof-loop sweep smoke
        run: |
          if [ -f artifacts/baseline-sweep-smoke/sweep_result.json ]; then
            python scripts/scir_sweep.py --manifest tests/sweeps/python_proof_loop_smoke.json --output-dir artifacts/sweep-smoke --compare artifacts/baseline-sweep-smoke --enforce-regression-gates
          else
            python scripts/scir_sweep.py --manifest tests/sweeps/python_proof_loop_smoke.json --output-dir artifacts/sweep-smoke
          fi
      - name: Upload sweep smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sweep-smoke
          path: artifacts/sweep-smoke
