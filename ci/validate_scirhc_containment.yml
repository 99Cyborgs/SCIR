name: validate_scirhc_containment

purpose: keep SCIR-Hc derived-only, lineage-bound, execution-gated, validator-enforced, and audit-verifiable

commands:
  - python -m unittest discover -s tests
  - python scripts/scir_bootstrap_pipeline.py --mode validate
  - python scripts/validate_translation.py
  - python scripts/benchmark_contract_dry_run.py --claim-run
  - python scripts/validate_repo_contracts.py --mode validate

blocking_conditions:
  - unauthorized SCIR-Hc transform execution
  - forged or untrusted execution context
  - partial lineage binding
  - invalid or incomplete scirhc_diff_audit.json
  - metric authority escalation
  - claim-run containment failure
